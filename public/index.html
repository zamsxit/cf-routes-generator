<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF ROUTE GENERATOR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: #000000; 
            color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
        }

        .glass-panel { 
            width: 100%; 
            max-width: 700px; 
            background: rgba(15, 23, 42, 0.3); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 12px; 
            padding: 32px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); 
        }

        h2 { 
            text-align: center; 
            margin-bottom: 28px; 
            font-weight: 600; 
            font-size: 1.5rem; 
            letter-spacing: -0.02em; 
            color: #f1f5f9; 
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group.full-width { grid-column: span 2; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.85rem; 
            font-weight: 500; 
            color: #94a3b8; 
        }

        input { 
            width: 100%; 
            padding: 10px 14px; 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 6px; 
            color: #f8fafc; 
            font-size: 0.95rem; 
            font-family: inherit; 
            transition: all 0.3s ease; 
            outline: none; 
        }

        input:focus { 
            border-color: #2563eb; 
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); 
        }

        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 24px; 
        }

        button { 
            flex: 1; 
            padding: 12px 16px; 
            border: none; 
            border-radius: 6px; 
            font-size: 0.95rem; 
            font-weight: 500; 
            font-family: inherit; 
            cursor: pointer; 
            transition: all 0.2s ease; 
        }

        .btn-primary { 
            background-color: #2563eb; 
            color: #ffffff; 
        }

        .btn-primary:hover { 
            background-color: #1d4ed8; 
        }

        .btn-secondary { 
            background-color: transparent; 
            color: #cbd5e1; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
        }

        .btn-secondary:hover { 
            background-color: rgba(255, 255, 255, 0.05); 
            color: #ffffff; 
        }

        .output-wrapper { 
            position: relative; 
            margin-top: 28px; 
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            overflow: hidden;
            display: none;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .table-header h3 {
            font-size: 0.9rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        .copy-btn { 
            flex: none;
            background: #334155; 
            color: #f8fafc; 
            padding: 6px 12px; 
            font-size: 0.75rem; 
            border-radius: 4px; 
        }

        .copy-btn:hover { background: #475569; }

        .table-container {
            max-height: 300px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.85rem;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            font-weight: 500;
            color: #94a3b8;
            position: sticky;
            top: 0;
            backdrop-filter: blur(4px);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h2>Email Routing</h2>
        
        <div class="form-grid">
            <div class="form-group full-width">
                <label>API Token</label>
                <input type="password" id="apiToken">
            </div>
            <div class="form-group full-width">
                <label>Zone ID</label>
                <input type="text" id="zoneId">
            </div>
            <div class="form-group">
                <label>Domain Name</label>
                <input type="text" id="domain" placeholder="example.com">
            </div>
            <div class="form-group">
                <label>Destination Email</label>
                <input type="email" id="destEmail">
            </div>
            <div class="form-group full-width">
                <label>Amount</label>
                <input type="number" id="targetCount" value="10" min="1">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="createRoutes()">Generate</button>
            <button class="btn-secondary" onclick="showList()">Load List</button>
        </div>

        <div class="output-wrapper" id="outputWrapper">
            <div class="table-header">
                <h3 id="tableTitle">Results</h3>
                <button class="copy-btn" id="copyBtn" onclick="copyTable()">Copy Table</button>
            </div>
            <div class="table-container">
                <table id="resultTable">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Alias</th>
                            <th>Destination</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function maskEmail(email) {
            if (!email.includes("@")) return email;
            const [user, domain] = email.split("@");
            if (user.length <= 2) return `${user}***@${domain}`;
            return `${user.substring(0, 2)}******${user.substring(user.length - 2)}@${domain}`;
        }

        function showWrapper(title) {
            document.getElementById("outputWrapper").style.display = "block";
            document.getElementById("tableTitle").innerText = title;
            document.getElementById("tableBody").innerHTML = "";
        }

        function addRow(no, alias, dest, status) {
            const tbody = document.getElementById("tableBody");
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${no}</td>
                <td>${alias}</td>
                <td>${dest}</td>
                <td>${status}</td>
            `;
            tbody.appendChild(tr);
        }

        async function getRules(token, zoneId) {
            try {
                const res = await fetch('/api/get-rules', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, zoneId })
                });
                const data = await res.json();
                return data.result || [];
            } catch (e) {
                return [];
            }
        }

        async function showList() {
            const token = document.getElementById("apiToken").value;
            const zoneId = document.getElementById("zoneId").value;
            
            if (!token || !zoneId) return alert("API Token and Zone ID required.");

            showWrapper("Loading Data...");
            const rules = await getRules(token, zoneId);
            
            if (rules.length === 0) {
                document.getElementById("tableTitle").innerText = "No routes found.";
                return;
            }

            document.getElementById("tableTitle").innerText = "Route List";
            rules.forEach((r, i) => {
                const emailAlias = r.matchers && r.matchers[0] ? r.matchers[0].value : 'Catch-all';
                const destRaw = r.actions && r.actions[0] ? r.actions[0].value[0] : 'N/A';
                const status = r.enabled ? 'Active' : 'Inactive';
                addRow(i + 1, emailAlias, maskEmail(destRaw), status);
            });
        }

        async function createRoutes() {
            const token = document.getElementById("apiToken").value;
            const zoneId = document.getElementById("zoneId").value;
            const domain = document.getElementById("domain").value;
            const destEmail = document.getElementById("destEmail").value;
            const targetCount = parseInt(document.getElementById("targetCount").value) || 10;

            if (!token || !zoneId || !domain || !destEmail) return alert("Complete all inputs.");

            showWrapper(`Generating ${targetCount} Routes...`);
            const existingRules = await getRules(token, zoneId);
            const existingPrefixes = new Set();
            
            existingRules.forEach(r => {
                if (r.matchers && r.matchers[0] && r.matchers[0].value) {
                    existingPrefixes.add(r.matchers[0].value.split('@')[0]);
                }
            });

            let count = 0;

            while (count < targetCount) {
                const num = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
                const prefix = `ivaskuuu${num}`;

                if (!existingPrefixes.has(prefix)) {
                    const payload = {
                        actions: [{ type: "forward", value: [destEmail] }],
                        matchers: [{ field: "to", type: "literal", value: `${prefix}@${domain}` }],
                        name: `Route ${prefix}`,
                        enabled: true
                    };

                    try {
                        const res = await fetch('/api/create-route', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token, zoneId, payload })
                        });

                        if (res.ok) {
                            count++;
                            addRow(count, `${prefix}@${domain}`, maskEmail(destEmail), "Created");
                            existingPrefixes.add(prefix);
                        } else {
                            addRow("-", prefix, "FAILED", "Error API");
                            break;
                        }
                    } catch (e) {
                        addRow("-", prefix, "FAILED", "Connection Error");
                        break;
                    }
                }
            }
            document.getElementById("tableTitle").innerText = `Successfully created ${count} routes`;
        }

        function copyTable() {
            const table = document.getElementById("resultTable");
            const range = document.createRange();
            range.selectNode(table);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            
            try {
                document.execCommand('copy');
                const btn = document.getElementById("copyBtn");
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = "Copy Table", 2000);
            } catch (err) {
                alert("Failed to copy text");
            }
            window.getSelection().removeAllRanges();
        }
    </script>
</body>
</html>
